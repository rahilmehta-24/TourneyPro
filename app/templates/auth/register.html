{% extends "base.html" %}

{% block title %}Register - TourneyPro Tennis{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; margin: 0 auto; padding: var(--spacing-xl) var(--spacing-md);">
    <div class="form-section" style="background: var(--bg-card); padding: var(--spacing-lg); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);">
        <h2 class="form-section-title" style="text-align: center; margin-bottom: var(--spacing-sm); font-size: 2rem;">Join TourneyPro Tennis 🎾</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: var(--spacing-lg);">Create a player/organizer account</p>
        
        <form method="POST">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-input" required placeholder="Choose a username">
            </div>
            
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" required placeholder="Enter your email">
            </div>
            
            <div class="form-group" style="margin-bottom: var(--spacing-lg);">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input" required placeholder="Choose a secure password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-large" style="margin-bottom: var(--spacing-md);">
                <span class="btn-icon">🚀</span> Register Account
            </button>
        </form>
        
        <div style="text-align: center; margin-top: var(--spacing-md); color: var(--text-secondary);">
            Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--accent-primary); text-decoration: none; font-weight: 600;">Log in here</a>
        </div>
    </div>
</div>
{% endblock %}
