{% extends "base.html" %}

{% block title %}Log In - TourneyPro Tennis{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; margin: 0 auto; padding: var(--spacing-xl) var(--spacing-md);">
    <div class="form-section" style="background: var(--bg-card); padding: var(--spacing-lg); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);">
        <h2 class="form-section-title" style="text-align: center; margin-bottom: var(--spacing-sm); font-size: 2rem;">Welcome Back 🎾</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: var(--spacing-lg);">Log in to manage your Lawn Tennis Tournaments</p>
        
        <form method="POST">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-input" required placeholder="Enter username">
            </div>
            
            <div class="form-group" style="margin-bottom: var(--spacing-lg);">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input" required placeholder="Enter password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-large" style="margin-bottom: var(--spacing-md);">
                <span class="btn-icon">🔓</span> Log In
            </button>
        </form>
        
        <div style="text-align: center; margin-top: var(--spacing-md); color: var(--text-secondary);">
            Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: var(--accent-primary); text-decoration: none; font-weight: 600;">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
